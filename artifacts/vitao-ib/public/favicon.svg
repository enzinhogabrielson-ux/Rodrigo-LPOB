<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gold circle background -->
  <circle cx="32" cy="32" r="32" fill="#D6B88A"/>

  <!-- Trading chart icon (upward trend) -->
  <path d="M 16 42 L 28 28 L 38 35 L 48 18" stroke="#0F0D0B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small circle markers on chart line -->
  <circle cx="16" cy="42" r="2.5" fill="#0F0D0B"/>
  <circle cx="28" cy="28" r="2.5" fill="#0F0D0B"/>
  <circle cx="38" cy="35" r="2.5" fill="#0F0D0B"/>
  <circle cx="48" cy="18" r="2.5" fill="#0F0D0B"/>
  
  <!-- Horizontal axis line -->
  <line x1="12" y1="48" x2="52" y2="48" stroke="#0F0D0B" stroke-width="2" stroke-linecap="round"/>
</svg>