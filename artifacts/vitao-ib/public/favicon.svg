<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mammoth-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D6B88A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A88860;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="28" ry="32" fill="url(#mammoth-grad)" stroke="#8B7355" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="50" cy="28" r="18" fill="url(#mammoth-grad)" stroke="#8B7355" stroke-width="1.5"/>
  <!-- Trunk -->
  <path d="M 50 40 Q 52 52 50 65" stroke="#8B7355" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tusks left -->
  <path d="M 42 50 Q 35 55 32 65" stroke="#F5DEB3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tusks right -->
  <path d="M 58 50 Q 65 55 68 65" stroke="#F5DEB3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="44" cy="24" r="2" fill="#2C2C2C"/>
  <circle cx="56" cy="24" r="2" fill="#2C2C2C"/>
  <!-- Ears -->
  <ellipse cx="35" cy="32" rx="5" ry="8" fill="#A88860" stroke="#8B7355" stroke-width="1"/>
  <ellipse cx="65" cy="32" rx="5" ry="8" fill="#A88860" stroke="#8B7355" stroke-width="1"/>
  <!-- Legs -->
  <rect x="38" y="80" width="4" height="15" rx="2" fill="#8B7355"/>
  <rect x="58" y="80" width="4" height="15" rx="2" fill="#8B7355"/>
  <rect x="46" y="82" width="4" height="13" rx="2" fill="#8B7355"/>
  <rect x="66" y="82" width="4" height="13" rx="2" fill="#8B7355"/>
</svg>
