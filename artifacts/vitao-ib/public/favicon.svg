<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="32" fill="#32C77A"/>

  <!-- Mammoth silhouette in white -->
  <!-- Body -->
  <ellipse cx="33" cy="40" rx="14" ry="11" fill="white"/>
  <!-- Head -->
  <circle cx="33" cy="24" r="10" fill="white"/>
  <!-- Ear left -->
  <ellipse cx="24" cy="21" rx="4" ry="5.5" fill="white"/>
  <!-- Ear right -->
  <ellipse cx="42" cy="21" rx="4" ry="5.5" fill="white"/>
  <!-- Trunk -->
  <path d="M 33 32 Q 31 38 30 43 Q 29 46 31 47" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tusk left -->
  <path d="M 26 31 Q 21 36 20 42" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Tusk right -->
  <path d="M 40 31 Q 45 36 46 42" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Legs -->
  <rect x="24" y="49" width="5" height="9" rx="2.5" fill="white"/>
  <rect x="36" y="49" width="5" height="9" rx="2.5" fill="white"/>
  <!-- Eyes (dark) -->
  <circle cx="29" cy="22" r="1.8" fill="#32C77A"/>
  <circle cx="37" cy="22" r="1.8" fill="#32C77A"/>
  <!-- Fur on top -->
  <path d="M 27 16 Q 30 11 33 14 Q 36 11 39 16" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
