<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1A2E1F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F0D0B;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg-grad)"/>

  <!-- Body -->
  <ellipse cx="50" cy="62" rx="22" ry="20" fill="#32C77A"/>

  <!-- Head -->
  <circle cx="50" cy="38" r="16" fill="#32C77A"/>

  <!-- Ears -->
  <ellipse cx="35" cy="33" rx="5" ry="7" fill="#28A566"/>
  <ellipse cx="65" cy="33" rx="5" ry="7" fill="#28A566"/>

  <!-- Trunk (curves down then to the right) -->
  <path d="M 50 48 Q 48 57 46 63 Q 44 68 48 70" stroke="#28A566" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Tusks -->
  <path d="M 40 48 Q 33 54 31 63" stroke="#e8f5e9" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 60 48 Q 67 54 69 63" stroke="#e8f5e9" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="43" cy="34" r="2.5" fill="#0F0D0B"/>
  <circle cx="57" cy="34" r="2.5" fill="#0F0D0B"/>
  <!-- Eye shine -->
  <circle cx="44" cy="33" r="0.8" fill="white"/>
  <circle cx="58" cy="33" r="0.8" fill="white"/>

  <!-- Legs -->
  <rect x="35" y="77" width="7" height="14" rx="3" fill="#28A566"/>
  <rect x="58" y="77" width="7" height="14" rx="3" fill="#28A566"/>

  <!-- Fur bumps on top of head -->
  <path d="M 44 24 Q 46 19 50 22 Q 54 19 56 24" stroke="#28A566" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
