<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Green circle background -->
  <circle cx="32" cy="32" r="32" fill="#32C77A"/>

  <!-- Mammoth in side profile (facing left) -->

  <!-- Body - big rounded hump -->
  <ellipse cx="32" cy="35" rx="17" ry="13" fill="white"/>

  <!-- Hump on back -->
  <ellipse cx="24" cy="27" rx="10" ry="8" fill="white"/>

  <!-- Head (smaller, front) -->
  <ellipse cx="44" cy="30" rx="8" ry="7" fill="white"/>

  <!-- Trunk hanging down then curling -->
  <path d="M 50 33 Q 54 38 53 43 Q 52 47 49 47" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tusk (long, curved upward) -->
  <path d="M 50 35 Q 56 34 58 29 Q 59 25 56 24" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="47" cy="27" r="1.8" fill="#32C77A"/>

  <!-- Ear flap -->
  <ellipse cx="40" cy="25" rx="3.5" ry="4.5" fill="white" opacity="0.7"/>

  <!-- Legs (4 blocky legs) -->
  <rect x="19" y="45" width="5" height="9" rx="2" fill="white"/>
  <rect x="27" y="46" width="5" height="8" rx="2" fill="white"/>
  <rect x="35" y="46" width="5" height="8" rx="2" fill="white"/>
  <rect x="43" y="45" width="5" height="9" rx="2" fill="white"/>

  <!-- Fur texture on top (wavy line) -->
  <path d="M 15 27 Q 18 22 21 26 Q 24 21 27 25 Q 30 20 33 24" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
